<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="halo" cx="50%" cy="46%" r="42%">
      <stop offset="0%" stop-color="#b6ff63" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#7ed13f" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#7ed13f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gem" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#e6ffab"/>
      <stop offset="42%" stop-color="#93d84a"/>
      <stop offset="100%" stop-color="#4c8a22"/>
    </linearGradient>
    <linearGradient id="core" x1="0.5" y1="0.2" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#f2ffcf"/>
      <stop offset="100%" stop-color="#a6e85a"/>
    </linearGradient>
  </defs>

  <!-- halo -->
  <ellipse cx="256" cy="238" rx="205" ry="230" fill="url(#halo)"/>

  <!-- gem body -->
  <polygon points="256,60 366,196 336,410 256,456 176,410 146,196"
           fill="url(#gem)" stroke="#eaffb8" stroke-width="7" stroke-linejoin="round"/>

  <!-- facets -->
  <polygon points="256,60 366,196 256,232 146,196" fill="#ffffff" opacity="0.28"/>
  <polygon points="146,196 256,232 176,410" fill="#3f7a1e" opacity="0.30"/>
  <polygon points="366,196 336,410 256,232" fill="#c7ef78" opacity="0.30"/>
  <polygon points="256,232 176,410 256,456 336,410" fill="#6fb02f" opacity="0.22"/>

  <!-- inner glow core -->
  <ellipse cx="256" cy="300" rx="52" ry="72" fill="url(#core)" opacity="0.65"/>

  <!-- vine swirl -->
  <path d="M256,392 C256,352 292,344 292,312 C292,286 268,282 262,300 C258,312 272,320 282,312"
        fill="none" stroke="#2f5416" stroke-width="12" stroke-linecap="round"/>
  <path d="M256,392 C256,352 292,344 292,312 C292,286 268,282 262,300 C258,312 272,320 282,312"
        fill="none" stroke="#7cbb3c" stroke-width="5" stroke-linecap="round"/>
  <!-- stem down -->
  <path d="M256,392 L256,300" stroke="#2f5416" stroke-width="12" stroke-linecap="round"/>
  <path d="M256,392 L256,300" stroke="#7cbb3c" stroke-width="5" stroke-linecap="round"/>

  <!-- leaves -->
  <g stroke="#2f5416" stroke-width="6" stroke-linejoin="round">
    <path d="M256,336 C238,330 224,338 222,354 C240,356 254,350 256,336 Z" fill="#8fd13f"/>
    <path d="M256,300 C274,294 290,302 292,318 C274,320 258,314 256,300 Z" fill="#a9d651"/>
    <path d="M256,364 C272,360 286,368 288,382 C272,384 258,378 256,364 Z" fill="#8fd13f"/>
  </g>
</svg>
