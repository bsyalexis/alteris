name: Mise à jour quotidienne Dofus

# Vérifie chaque jour la version du jeu (dofusdude), met à jour data/*.json,
# et pousse s'il y a du changement. Vercel (connecté en Git) rebuild l'app
# Next.js sur push (le prebuild copie data/ -> public/data/).

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Capture des données
        run: node build/capture.mjs

      - name: Commit & push si changement
        run: |
          git config user.name "alteris-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Aucun changement — pas de redéploiement."
          else
            git commit -m "chore: maj données Dofus ($(date -u +%F))"
            git push
          fi
